<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flashcards | Postura e Locomoção</title>
  <style>
    :root {
      --paper: #f7f5ef;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #66707a;
      --line: #d9d5c9;
      --teal: #176b70;
      --wine: #8c2f39;
      --amber: #b06f18;
      --soft: #e8f3f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }
    header {
      padding: 34px 28px;
      color: #fff;
      background: linear-gradient(110deg, #17202a, #176b70);
      border-bottom: 4px solid var(--amber);
    }
    nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    nav a {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 7px 11px;
      color: #fff;
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.28);
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
    }
    main {
      width: min(980px, calc(100% - 32px));
      margin: 24px auto 48px;
    }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.05; }
    h2 { margin: 0; color: var(--teal); }
    p { margin: 0 0 14px; }
    button {
      min-height: 42px;
      padding: 9px 13px;
      color: var(--ink);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }
    button.primary {
      color: #fff;
      background: var(--wine);
      border-color: var(--wine);
    }
    button.secondary {
      color: var(--teal);
      background: var(--soft);
      border-color: transparent;
    }
    .eyebrow {
      margin: 0 0 6px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      opacity: .86;
    }
    .study-shell {
      padding: 22px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 16px 38px rgba(23,32,42,.10);
    }
    .bar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .meter {
      width: min(280px, 100%);
      height: 9px;
      overflow: hidden;
      background: #ece7dc;
      border-radius: 999px;
    }
    .meter span {
      display: block;
      width: 0;
      height: 100%;
      background: var(--amber);
      transition: width .2s ease;
    }
    .flashcard {
      display: grid;
      min-height: 300px;
      place-items: center;
      padding: 28px;
      text-align: center;
      background: linear-gradient(135deg, #ffffff, #e8f3f1);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .flashcard strong {
      display: block;
      margin-bottom: 12px;
      color: var(--wine);
      font-size: .84rem;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .flashcard span {
      display: block;
      max-width: 720px;
      font-size: clamp(1.2rem, 3vw, 1.7rem);
      font-weight: 700;
      line-height: 1.35;
    }
    .actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
    }
    .item {
      padding: 14px;
      background: #fbfaf6;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .item strong {
      display: block;
      color: var(--teal);
      margin-bottom: 5px;
    }
    .muted { color: var(--muted); }
    @media (max-width: 720px) {
      header { padding: 28px 18px; }
      .study-shell { padding: 16px; }
      .list { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Flashcards HTML compartilháveis</p>
    <h1>Flashcards</h1>
    <p>Revise os conceitos essenciais de Postura e Locomoção diretamente no navegador.</p>
    <nav aria-label="Links do pacote">
      <a href="index.html">Ambiente principal</a>
      <a href="MATERIAIS.html">Materiais</a>
      <a href="GUIA_DE_ESTUDOS.html">Guia</a>
      <a href="QUESTOES_REVISAO.html">Questões</a>
    </nav>
  </header>

  <main>
    <section class="study-shell" aria-labelledby="title">
      <div class="bar">
        <div>
          <h2 id="title">Treino ativo</h2>
          <p id="counter" class="muted"></p>
        </div>
        <div class="meter" aria-label="Progresso"><span id="meter"></span></div>
      </div>

      <button id="card" class="flashcard" type="button" aria-live="polite"></button>

      <div class="actions">
        <button id="prev" class="secondary" type="button">Anterior</button>
        <button id="flip" class="primary" type="button">Virar cartão</button>
        <button id="next" class="secondary" type="button">Próximo</button>
      </div>
    </section>

    <section class="list" id="cardList" aria-label="Lista completa de flashcards"></section>
  </main>

  <script>
    const cards = [
      ["Qual é a ideia central do sistema motor?", "Movimento resulta da integração entre cérebro, medula, músculos e sentidos."],
      ["O que o córtex faz no movimento?", "Decide, planeja e envia comandos motores voluntários."],
      ["O que o tronco encefálico ajusta?", "Tônus, postura, equilíbrio, reflexos e respostas motoras automáticas."],
      ["Qual é o papel da medula?", "Receber comandos descendentes e enviar a ordem final aos músculos."],
      ["Onde fica o córtex motor primário?", "No giro pré-central, no lobo frontal."],
      ["Por que mãos e face são grandes no homúnculo?", "Porque exigem controle fino e grande precisão motora."],
      ["O que a área pré-motora faz?", "Planeja movimentos guiados por estímulos externos, como visão e ambiente."],
      ["O que a área suplementar faz?", "Organiza sequências de movimentos aprendidos e automatizados."],
      ["Qual é a principal função do trato corticoespinal?", "Controlar movimentos voluntários conscientes, principalmente finos e distais."],
      ["O que é decussação das pirâmides?", "Cruzamento de muitas fibras corticoespinais no bulbo."],
      ["Por que uma lesão cortical direita pode afetar o lado esquerdo?", "Porque muitas fibras corticoespinais cruzam antes de chegar à medula."],
      ["O que são vias extrapiramidais?", "Vias motoras automáticas que regulam postura, tônus, equilíbrio e movimentos não conscientes."],
      ["Função da via vestibuloespinal?", "Ajustar postura e equilíbrio com base no ouvido interno."],
      ["Função da via reticuloespinal?", "Regular tônus, postura e movimentos automáticos."],
      ["Função da via rubroespinal?", "Participar do controle de músculos flexores, especialmente nos membros superiores."],
      ["Quais sistemas alimentam a integração sensorial?", "Propriocepção, sistema vestibular e visão."],
      ["O que são ajustes antecipatórios?", "Preparações posturais que acontecem antes do movimento."],
      ["O que são ajustes compensatórios?", "Correções rápidas após perturbação ou perda de equilíbrio."],
      ["Sinais típicos da síndrome do NMS?", "Espasticidade, hiperreflexia, Babinski e fraqueza central."],
      ["Sinais típicos da síndrome do NMI?", "Fraqueza, hipotonia, hiporreflexia e atrofia."],
      ["Sinais típicos de síndrome cerebelar?", "Ataxia, dismetria, tremor de intenção e marcha instável."],
      ["Qual síndrome tem hiperreflexia?", "Síndrome do neurônio motor superior."],
      ["Qual síndrome tem hiporreflexia?", "Síndrome do neurônio motor inferior."],
      ["Qual estrutura corrige movimento e coordenação?", "Cerebelo, com feedback sensorial e vias motoras."]
    ];

    let index = 0;
    let flipped = false;

    const card = document.getElementById("card");
    const counter = document.getElementById("counter");
    const meter = document.getElementById("meter");
    const list = document.getElementById("cardList");

    function render() {
      const side = flipped ? "Resposta" : "Pergunta";
      card.innerHTML = `<div><strong>${side}</strong><span>${flipped ? cards[index][1] : cards[index][0]}</span></div>`;
      counter.textContent = `Cartão ${index + 1} de ${cards.length}`;
      meter.style.width = `${Math.round(((index + 1) / cards.length) * 100)}%`;
    }

    function move(offset) {
      index = (index + offset + cards.length) % cards.length;
      flipped = false;
      render();
    }

    document.getElementById("prev").addEventListener("click", () => move(-1));
    document.getElementById("next").addEventListener("click", () => move(1));
    document.getElementById("flip").addEventListener("click", () => { flipped = !flipped; render(); });
    card.addEventListener("click", () => { flipped = !flipped; render(); });

    list.innerHTML = cards.map(([front, back], i) => `
      <article class="item">
        <strong>${i + 1}. ${front}</strong>
        <span>${back}</span>
      </article>
    `).join("");

    render();
  </script>
</body>
</html>
